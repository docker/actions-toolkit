name: pr-assign-author

permissions:
  contents: read

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] does not checkout, safe to use pull_request_target
    types:
      - opened
      - reopened

jobs:
  run:
    uses: crazy-max/.github/.github/workflows/pr-assign-author.yml@9ba6e6f9450baf3b1237f8035c1fdc45932510bd # v1.8.0
    permissions:
      contents: read
      pull-requests: write
